name: TinyJSON
options:
  bundleIdPrefix: com.tinyjson
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyJSON:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyJSON
        excludes:
          - "Resources"
      - path: Sources/TinyJSON/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyJSON/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TinyJSON/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: JSON Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.json
            CFBundleTypeExtensions:
              - json
          - CFBundleTypeName: JSON Lines Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - org.jsonlines.jsonl
            CFBundleTypeExtensions:
              - jsonl
              - ndjson
          - CFBundleTypeName: GeoJSON Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - org.geojson.geojson
            CFBundleTypeExtensions:
              - geojson
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - txt
              - text
        LSApplicationCategoryType: public.app-category.productivity
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: public.json
            UTTypeDescription: JSON Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - json
          - UTTypeIdentifier: org.jsonlines.jsonl
            UTTypeDescription: JSON Lines Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - jsonl
                - ndjson
          - UTTypeIdentifier: org.geojson.geojson
            UTTypeDescription: GeoJSON Document
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - geojson
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjson.app
        PRODUCT_NAME: "TinyJSON"
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyJSON.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit
